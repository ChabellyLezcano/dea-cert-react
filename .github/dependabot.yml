version: 2
updates:
  # npm dependencies (catches deprecated/abandoned packages when a
  # successor or new major exists; for "pure" deprecations with no
  # successor, that's handled by the claude-scheduled-audit.yml workflow)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    ignore:
      # typescript-eslint@8.64.0 still declares
      # peer typescript@">=4.8.4 <6.1.0" — anything >=6.1 breaks npm ci
      # until typescript-eslint supports it. Bounded from below at >6.0
      # (not a specific major) so this also catches a future 8.x, not
      # just the 7.x that broke us before.
      - dependency-name: 'typescript'
        versions: ['>= 6.1.0']
    groups:
      dev-dependencies:
        dependency-type: 'development'
        update-types: ['minor', 'patch']
      prod-minor-patch:
        dependency-type: 'production'
        update-types: ['minor', 'patch']
    # Production majors are left out of the groups so each one arrives
    # in its own PR and you can review them more carefully
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(deps)'

  # Base image in the Dockerfile
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'dependencies'
      - 'docker'

  # GitHub Actions workflows also go stale over time
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'dependencies'
      - 'ci'
