<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DEA·26 — Personal review platform for the Databricks Certified Data Engineer Associate exam."
    />
    <title>DEA·26 · Databricks Data Engineer Associate Prep</title>
  </head>
  <body>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('dea26-theme');
          var isDark =
            stored === 'dark' ||
            (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          }
        } catch (_) {
          /* localStorage unavailable, fall back to light */
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
