server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Vite fingerprints asset filenames per build (e.g. QuizPage-BWTLpBhg.js),
  # so it's safe to cache them aggressively -- a new deploy always ships new
  # filenames, it never mutates an existing one.
  location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|webp|woff2?)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # index.html is the one file whose *name* never changes between deploys,
  # so it must always be revalidated -- otherwise a browser (or intermediate
  # cache) can keep serving an old index.html that references JS/CSS chunk
  # filenames from a previous build that no longer exist on disk, which
  # surfaces to the user as a 404 / broken page after a redeploy.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  # Single-page app: fall back to index.html for client-side routes
  location / {
    try_files $uri $uri/ /index.html;
  }

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}